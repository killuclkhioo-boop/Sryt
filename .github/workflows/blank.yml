name: RDP-ULTIMATE-V9-MULTI-USER-NO-PING

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: 1. Extreme Watermark Removal & Test Mode Off
        run: |
          Write-Host "Removing Test Mode Watermark & Visual Junk..."
          # --- ปิด Test Mode และลบลายน้ำ ---
          bcdedit /set testsigning off
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\SoftwareProtectionPlatform\Activation" /v Manual /t REG_DWORD /d 1 /f
          reg add "HKCU\Control Panel\Desktop" /v PaintDesktopVersion /t REG_DWORD /d 0 /f
          
          # --- ปรับ UI ให้ลื่นที่สุด (ลดแล็ค) ---
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f
          reg add "HKCU\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f
          rundll32.exe user32.dll,UpdatePerUserSystemParameters

      - name: 2. Network Turbo & Ping Fix (No-Nagle)
        run: |
          Write-Host "Optimizing Network for Ultra-Low Ping..."
          # --- ปรับแต่ง TCP/IP เพื่อลดปิง (ลบการดีเลย์ของ Packet) ---
          $netPath = "HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces"
          Get-ChildItem $netPath | ForEach-Object {
              reg add "$($_.PSPath)" /v TcpAckFrequency /t REG_DWORD /d 1 /f
              reg add "$($_.PSPath)" /v TCPNoDelay /t REG_DWORD /d 1 /f
          }
          # ปิดระบบ Auto-Tuning ที่ทำให้เน็ตแกว่ง
          netsh int tcp set global autotuninglevel=disabled
          netsh int tcp set global chimney=enabled
          netsh int tcp set global rss=enabled

      - name: 3. Multi-User Access (Unlock Unlimited Sessions)
        run: |
          Write-Host "Unlocking Multi-User RDP Sessions..."
          # --- อนุญาตให้รีโมทเข้ามาพร้อมกันได้หลายคน (Concurrent RDP) ---
          $tsPath = "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server"
          reg add "$tsPath" /v fSingleSessionPerUser /t REG_DWORD /d 0 /f
          reg add "$tsPath" /v LimitVideoResolution /t REG_DWORD /d 0 /f
          
          # เพิ่มสิทธิ์ให้ User ทุกคนสามารถเข้าถึง RDP ได้ (ใช้รหัสเดียวกัน)
          Set-ItemProperty -Path "$tsPath\WinStations\RDP-Tcp" -Name "MaxInstanceCount" -Value 10
          Restart-Service -Name TermService -Force

      - name: 4. Create God-Mode User (Anti-Error 1)
        run: |
          $u = "RDPAdmin"; $p = "GodMode@2026!"
          if (Get-LocalUser -Name $u -ErrorAction SilentlyContinue) { Remove-LocalUser -Name $u }
          $secPass = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $secPass -FullName "Global Administrator" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          echo "FINAL_USER=$u" >> $env:GITHUB_ENV
          echo "FINAL_PASS=$p" >> $env:GITHUB_ENV

      - name: 5. Install Fixed Sunshine (Latest Multi-Link)
        run: |
          Write-Host "Downloading Sunshine..."
          $sunUrl = "https://github.com/LizardByte/Sunshine/releases/download/v2024.11.13.125950/sunshine-windows-x86_64-setup.exe"
          $ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          try {
              Invoke-WebRequest -Uri $sunUrl -OutFile "sun_setup.exe" -UserAgent $ua
              Start-Process .\sun_setup.exe -ArgumentList "/S" -Wait
              Write-Host "Sunshine Ready."
          } catch { Write-Host "Sunshine download failed, RDP still works." }

      - name: 6. Connect Tailscale
        run: |
          Write-Host "Deploying Tailscale..."
          $msiUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $msiUrl -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $retry = 0
          while (!(Test-Path $tsExe) -and $retry -lt 20) { Start-Sleep -Seconds 5; $retry++ }
          
          & $tsExe up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-multi-2026 --accept-dns=false
          $tsIP = & $tsExe ip -4
          echo "GOD_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 7. Auto-Launch & Ping Monitor
        run: |
          $autoScript = @"
          Start-Process "msedge.exe" "https://login.live.com"
          Start-Process "msedge.exe" "https://localhost:47990"
          Add-Type -AssemblyName System.Windows.Forms
          [System.Windows.Forms.MessageBox]::Show('MULTI-USER READY!\n- ปิด Test Mode แล้ว\n- ลดปิง Network แล้ว\n- เข้าใช้งานได้พร้อมกันหลายคน', 'God-Mode V9')
          "@
          $autoScript | Out-File "$env:TEMP\auto_start.ps1" -Encoding utf8
          reg add "HKLM\Software\Microsoft\Windows\CurrentVersion\Run" /v "GodModeStart" /t REG_SZ /d "powershell.exe -WindowStyle Normal -File $env:TEMP\auto_start.ps1" /f

      - name: 8. Keep Alive
        run: |
          Write-Host "`n========================================"
          Write-Host "🔱 GOD MODE V9 - THE UNSTOPPABLE!"
          Write-Host "📍 IP: $env:GOD_IP"
          Write-Host "👤 User: $env:FINAL_USER"
          Write-Host "🔑 Pass: $env:FINAL_PASS"
          Write-Host "⚡ Status: Multi-User & No-Ping Active"
          Write-Host "========================================`n"
          while ($true) { Start-Sleep -Seconds 300 }
